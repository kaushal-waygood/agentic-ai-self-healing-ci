  # Frontend Service (React/Vue/Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hsa-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_NODE_ENV=production
    ports:
      - '3000:80' # Nginx runs on 80 internally
    depends_on:
      - backend
    networks:
      - hsa-network

  uni-company-panel:
    build:
      context: ./uni-company-panel
      dockerfile: Dockerfile
    container_name: hsa-uni-company-panel
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_NODE_ENV=production
    ports:
      - '3002:3002' # Nginx runs on 80 internally
    depends_on:
      - backend
    networks:
      - hsa-network

  # MongoDB Service
  mongo:
    image: mongo:6
    container_name: hsa-mongo
    restart: always
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - '27017:27017'
    networks:
      - hsa-network

  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: hsa-redis
    restart: always
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    networks:
      - hsa-network

# Volumes & Networks
volumes:
  mongodb_data:
  redis_data:

networks:
  hsa-network:
    driver: bridge
