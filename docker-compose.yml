  # MongoDB Service
  mongo:
    image: mongo:6
    container_name: hsa-mongo
    restart: always
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - '27017:27017'
    networks:
      - hsa-network

  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: hsa-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - hsa-network

# Volumes & Networks
volumes:
  mongodb_data:
  redis_data:

networks:
  hsa-network:
    driver: bridge
