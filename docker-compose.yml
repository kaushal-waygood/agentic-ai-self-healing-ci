  # Frontend Service (React/Vue/Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hsa-frontend
    restart: unless-stopped
    ports:
      - '3000:80' # Nginx runs on 80 internally
    depends_on:
      - backend
    networks:
