name: Build & Deploy ZobsAI (Main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      # -------------------------------
      # Checkout Code
      # -------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # ensures all files and history are available

      # -------------------------------
      # Set Repository Owner
      # -------------------------------
      - name: Set lowercase repo owner
        id: vars
        run: echo "repo_owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      # -------------------------------
      # Backend: Cache, Setup Node, Install, Test
      # -------------------------------
      - name: Cache backend npm and node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            backend/node_modules
          # include package.json as a fallback so the key resolves even when package-lock.json is absent
          key: ${{ runner.os }}-backend-node-${{ hashFiles('backend/package-lock.json','backend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-node-

      - name: Setup Node for backend
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Show backend lockfile presence
        working-directory: ./backend
        run: |
          if [ -f package-lock.json ]; then echo "backend/package-lock.json: present"; else echo "backend/package-lock.json: missing"; fi
          ls -la

      - name: Install backend dependencies (conditional)
        working-directory: ./backend
        run: |
          if [ -f package-lock.json ]; then
            echo "Found package-lock.json — running npm ci"
            npm ci
          else
            echo "No package-lock.json — running npm install"
            npm install
          fi

      - name: Run backend tests
        working-directory: ./backend
        run: npm test

      # -------------------------------
      # Log in to GitHub Container Registry
      # -------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------
      # Build & Push Backend Image
      # -------------------------------
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.repo_owner }}/zobsai-backend:latest
            ghcr.io/${{ env.repo_owner }}/zobsai-backend:${{ github.sha }}

      # -------------------------------
      # Set Frontend Build Args
      # -------------------------------
      - name: Set Frontend Build Args
        run: |
          echo "NEXT_PUBLIC_API_URL=https://api.zobsai.com" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID=<prod-client-id>" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=<prod-key>" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_NODE_ENV=production" >> $GITHUB_ENV

      # -------------------------------
      # Frontend: Cache, Setup Node, Install, Test
      # -------------------------------
      - name: Cache frontend npm and node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            frontend/node_modules
          key: ${{ runner.os }}-frontend-node-${{ hashFiles('frontend/package-lock.json','frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-node-

      - name: Setup Node for frontend
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Show frontend lockfile presence
        working-directory: ./frontend
        run: |
          if [ -f package-lock.json ]; then echo "frontend/package-lock.json: present"; else echo "frontend/package-lock.json: missing"; fi
          ls -la

      - name: Install frontend dependencies (conditional)
        working-directory: ./frontend
        run: |
          if [ -f package-lock.json ]; then
            echo "Found package-lock.json — running npm ci"
            npm ci
          else
            echo "No package-lock.json — running npm install"
            npm install
          fi

      - name: Run frontend tests
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_NODE_ENV: production
        run: npm test

      # -------------------------------
      # Build & Push Frontend Image
      # -------------------------------
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ env.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ env.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_NODE_ENV=${{ env.NEXT_PUBLIC_NODE_ENV }}
          tags: |
            ghcr.io/${{ env.repo_owner }}/zobsai-frontend:latest
            ghcr.io/${{ env.repo_owner }}/zobsai-frontend:${{ github.sha }}

      # -------------------------------
      # Update Deployment Manifests
      # -------------------------------
      - name: Update Backend Deployment Manifest
        run: |
          MANIFEST="manifests/zobsai-backend-deployment.yaml"
          if [ -f "$MANIFEST" ]; then
            sed -i'' -e "s#^\(\s*image:\s*ghcr.io/${{ env.repo_owner }}/zobsai-backend:\).*#\1${{ github.sha }}#g" "$MANIFEST"
            echo "Backend deployment manifest updated."
          else
            echo "Backend manifest not found at $MANIFEST, skipping."
          fi

      - name: Update Frontend Deployment Manifest
        run: |
          MANIFEST="manifests/zobsai-frontend-deployment.yaml"
          if [ -f "$MANIFEST" ]; then
            sed -i'' -e "s#^\(\s*image:\s*ghcr.io/${{ env.repo_owner }}/zobsai-frontend:\).*#\1${{ github.sha }}#g" "$MANIFEST"
            echo "Frontend deployment manifest updated."
          else
            echo "Frontend manifest not found at $MANIFEST, skipping."
          fi

      # -------------------------------
      # Commit & Push Manifest Changes
      # -------------------------------
      - name: Commit and Push Manifest Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manifests/
          git commit -m "Update backend/frontend images to ${{ github.sha }}" || echo "No changes to commit"
          git push origin main
