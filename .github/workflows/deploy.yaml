name: Build & Deploy ZobsAI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase repo owner
        id: vars
        run: echo "repo_owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.repo_owner }}/zobsai-backend:latest
            ghcr.io/${{ env.repo_owner }}/zobsai-backend:${{ github.sha }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.repo_owner }}/zobsai-frontend:latest
            ghcr.io/${{ env.repo_owner }}/zobsai-frontend:${{ github.sha }}

      - name: Update Backend Image in Manifest
        run: |
          sed -i "s#ghcr.io/${{ env.repo_owner }}/zobsai-backend:.*#ghcr.io/${{ env.repo_owner }}/zobsai-backend:${{ github.sha }}#g" manifests/zobsai-backend-deployment.yaml

      - name: Update Frontend Image in Manifest
        run: |
          sed -i "s#ghcr.io/${{ env.repo_owner }}/zobsai-frontend:.*#ghcr.io/${{ env.repo_owner }}/zobsai-frontend:${{ github.sha }}#g" manifests/zobsai-frontend-deployment.yaml

      - name: Commit and Push Manifest Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manifests/
          git commit -m "Update backend/frontend images to ${{ github.sha }}" || echo "No changes to commit"
          git push origin main
