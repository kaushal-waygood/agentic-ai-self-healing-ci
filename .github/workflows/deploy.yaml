name: Build & Deploy ZobsAI (Main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      # -------------------------------
      # Checkout Code
      # -------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------
      # Set Repository Owner
      # -------------------------------
      - name: Set lowercase repo owner
        run: echo "repo_owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      # -------------------------------
      # Setup Node
      # -------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # -------------------------------
      # Backend: Cache & Install
      # -------------------------------
      - name: Cache backend npm and node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            backend/node_modules
          key: ${{ runner.os }}-backend-node-${{ hashFiles('backend/package-lock.json','backend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-node-

      - name: Install backend dependencies (including core-js)
        working-directory: ./backend
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
        run: |
          # Clean install to avoid missing modules
          npm install
          # Ensure core-js is installed for mongodb driver
          npm install core-js

      # -------------------------------
      # Backend Tests
      # -------------------------------
      - name: Run backend tests
        working-directory: ./backend
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
        run: npm test

      # -------------------------------
      # Log in to GHCR
      # -------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------
      # Build & Push Backend Image
      # -------------------------------
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.repo_owner }}/zobsai-backend:latest
            ghcr.io/${{ env.repo_owner }}/zobsai-backend:${{ github.sha }}

      # -------------------------------
      # Frontend Build Args
      # -------------------------------
      - name: Set Frontend Build Args
        run: |
          echo "NEXT_PUBLIC_API_URL=https://api.zobsai.com" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID=<prod-client-id>" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=<prod-key>" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_NODE_ENV=production" >> $GITHUB_ENV

      # -------------------------------
      # Frontend: Cache & Install
      # -------------------------------
      - name: Cache frontend npm and node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            frontend/node_modules
          key: ${{ runner.os }}-frontend-node-${{ hashFiles('frontend/package-lock.json','frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-node-

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run frontend tests
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_NODE_ENV: production
        run: npm test

      # -------------------------------
      # Build & Push Frontend Image
      # -------------------------------
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ env.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ env.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_NODE_ENV=${{ env.NEXT_PUBLIC_NODE_ENV }}
          tags: |
            ghcr.io/${{ env.repo_owner }}/zobsai-frontend:latest
            ghcr.io/${{ env.repo_owner }}/zobsai-frontend:${{ github.sha }}

      # -------------------------------
      # Update Manifests
      # -------------------------------
      - name: Update Backend Deployment Manifest
        run: |
          sed -i'' -e "s#zobsai-backend:.*#zobsai-backend:${{ github.sha }}#g" manifests/zobsai-backend-deployment.yaml || true

      - name: Update Frontend Deployment Manifest
        run: |
          sed -i'' -e "s#zobsai-frontend:.*#zobsai-frontend:${{ github.sha }}#g" manifests/zobsai-frontend-deployment.yaml || true

      # -------------------------------
      # Commit & Push
      # -------------------------------
      - name: Commit and Push Manifest Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manifests/
          git commit -m "Update images to ${{ github.sha }}" || echo "No changes"
          git push origin main
