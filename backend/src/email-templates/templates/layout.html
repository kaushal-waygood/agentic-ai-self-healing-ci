<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{subject}}</title>
    <style>
      :root {
        --bg: #f6f8fb;
        --card: #ffffff;
        --muted: #6b7280;
        --accent: #0b74de;
      }
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          Roboto, 'Helvetica Neue', Arial, sans-serif;
        color: #111;
      }
      .wrap {
        max-width: 680px;
        margin: 28px auto;
        padding: 20px;
      }
      .card {
        background: var(--card);
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(17, 24, 39, 0.06);
        overflow: hidden;
      }
      .body {
        padding: 28px;
      }
      .muted {
        color: var(--muted);
        font-size: 13px;
      }
      a.btn {
        display: inline-block;
        padding: 12px 18px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        background: #000;
        color: white;
      }
      @media (max-width: 600px) {
        .wrap {
          margin: 16px;
          padding: 12px;
        }
        .body {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">{{> header }} {{{body}}} {{> footer }}</div>
    </div>
  </body>
</html>
