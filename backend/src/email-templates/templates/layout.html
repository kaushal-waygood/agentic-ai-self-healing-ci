<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{subject}}</title>
    <style>
      :root {
        --bg: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f8fafc 100%);
        --card: #ffffff;
        --muted: #64748b;
        --accent: #0ea5e9;
        --accent-dark: #0284c7;
        --gradient: linear-gradient(135deg, #0ea5e9 0%, #3b82f6 50%, #6366f1 100%);
      }
      body {
        margin: 0;
        padding: 0;
        background: #f1f5f9;
        font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', Arial, sans-serif;
        color: #1e293b;
        line-height: 1.6;
      }
      .wrap {
        max-width: 600px;
        margin: 32px auto;
        padding: 24px;
      }
      .card {
        background: var(--card);
        border-radius: 16px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 10px 25px -5px rgba(0, 0, 0, 0.06);
        overflow: hidden;
        border: 1px solid rgba(14, 165, 233, 0.08);
      }
      .body {
        padding: 32px;
      }
      .muted {
        color: var(--muted);
        font-size: 13px;
      }
      a.btn {
        display: inline-block;
        padding: 14px 28px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
        font-size: 15px;
        background: linear-gradient(135deg, #0ea5e9 0%, #3b82f6 100%);
        color: white !important;
        box-shadow: 0 4px 14px rgba(14, 165, 233, 0.4);
        transition: transform 0.2s, box-shadow 0.2s;
      }
      a.btn:hover {
        box-shadow: 0 6px 20px rgba(14, 165, 233, 0.5);
      }
      .cred-table {
        width: 100%;
        border-collapse: collapse;
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        border: 1px solid #e2e8f0;
        margin: 20px 0;
        border-radius: 12px;
        overflow: hidden;
      }
      .cred-table td {
        padding: 14px 18px;
        border-bottom: 1px solid #e2e8f0;
      }
      .cred-table tr:last-child td {
        border-bottom: none;
      }
      .label {
        font-weight: 600;
        color: #475569;
        width: 40%;
      }
      .value {
        font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
        color: #0f172a;
      }
      @media (max-width: 600px) {
        .wrap {
          margin: 16px;
          padding: 16px;
        }
        .body {
          padding: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">{{> header }} {{{body}}} {{> footer }}</div>
    </div>
  </body>
</html>
