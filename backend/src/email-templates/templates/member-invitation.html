<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse: collapse">
  <tr>
    <td class="body" style="padding: 32px 32px; font-size: 15px;">
      <h2 style="margin: 0 0 8px 0; font-size: 24px; font-weight: 700; color: #0f172a;">Welcome, {{name}}! 🎉</h2>

      <p style="margin: 0 0 20px 0; color: #475569;">
        You've been added to a workspace on <strong style="color: #0f172a;">{{brandName}}</strong>.
      </p>

      <p style="margin: 0 0 24px 0; color: #475569;">
        Complete your signup to access your workspace and start collaborating with your team.
      </p>

      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse: collapse; margin: 28px 0;">
        <tr>
          <td style="text-align: center;">
            <a href="{{dashboardUrl}}" class="btn">Get Started — Dashboard</a>
          </td>
        </tr>
      </table>

      <p style="margin: 0 0 20px 0; font-size: 14px; color: #64748b;">
        Need help? Contact our support team at
        <a href="mailto:{{supportEmail}}" style="color: #0ea5e9; text-decoration: none;">{{supportEmail}}</a>.
      </p>

      <p style="margin: 24px 0 0 0; color: #475569;">
        Thanks,<br />
        <strong style="color: #0f172a;">The {{brandName}} Team</strong>
      </p>
    </td>
  </tr>
</table>
