<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse: collapse">
  <tr>
    <td class="body" style="padding: 32px 32px; font-size: 15px;">
      <h2 style="margin: 0 0 8px 0; font-size: 24px; font-weight: 700; color: #0f172a;">Hi {{name}}! 👋</h2>
      <p style="margin: 0 0 20px 0; color: #475569;">
        Thanks for signing up for <strong style="color: #0f172a;">{{brandName}}</strong>. Please verify
        your email address using the code below. It expires in
        <strong>15 minutes</strong>.
      </p>

      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse: collapse; margin: 24px 0;">
        <tr>
          <td style="text-align: center; padding: 24px 0;">
            <table role="presentation" cellpadding="0" cellspacing="0" style="border-collapse: collapse; margin: 0 auto; background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); border: 2px solid #0ea5e9; border-radius: 12px; padding: 20px 32px;">
              <tr>
                <td style="font-weight: 700; font-size: 28px; letter-spacing: 8px; color: #0f172a;">{{otp}}</td>
              </tr>
            </table>
          </td>
        </tr>
      </table>

      <p style="margin: 0 0 20px 0; color: #64748b; font-size: 14px;">
        If you didn't create an account, you can safely ignore this email or contact support at
        <a href="mailto:{{supportEmail}}" style="color: #0ea5e9; text-decoration: none;">{{supportEmail}}</a>.
      </p>

      <p style="margin: 24px 0 0 0; color: #475569;">
        Best regards,<br />
        <strong style="color: #0f172a;">The {{brandName}} Team</strong>
      </p>
    </td>
  </tr>
</table>
