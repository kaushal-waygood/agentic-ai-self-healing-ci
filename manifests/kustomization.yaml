apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: zobsai

resources:
  - zobsai-backend-configmap.yaml
  - zobsai-frontend-configs.yaml
  - zobsai-backend-secrets.yaml
  - zobsai-frontend-secrets.yaml
  - zobsai-redis.yaml
  - zobsai-backend-deployment.yaml
  - zobsai-frontend-deployment.yaml

labels:
  - name: app.kubernetes.io/managed-by
    value: kustomize
  - name: app.kubernetes.io/name
    value: zobsai

images:
  - name: ghcr.io/ZobsAI-com/zobsai-backend
    newTag: latest
  - name: ghcr.io/ZobsAI-com/zobsai-frontend
    newTag: latest
