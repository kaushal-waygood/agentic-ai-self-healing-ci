apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - zobsai-backend-deployment.yaml
  - zobsai-backend-cron-deployment.yaml
  - zobsai-backend-configmap.yaml
  - zobsai-backend-secrets.yaml
  - zobsai-frontend-deployment.yaml
  - zobsai-frontend-configs.yaml
  - zobsai-frontend-secrets.yaml
  - zobsai-redis.yaml
  - zobsai-uni-company-panel-deployment.yaml
  - zobsai-uni-company-panel-secret.yaml
  - zobsai-uni-company-panel-service.yaml
  - zobsai-uni-company-panel-config.yaml
  #- zobsai-backend-tests-job.yaml
  #- zobsai-frontend-tests-job.yaml
  # optionally: add ingress if you have one
  # - zobsai-ingress.yaml

images:
  - name: ghcr.io/zobsai-com/zobsai-backend
    newTag: latest
  - name: ghcr.io/zobsai-com/zobsai-frontend
    newTag: latest

namespace: zobsai
