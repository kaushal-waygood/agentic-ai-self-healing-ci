apiVersion: apps/v1
kind: Deployment
metadata:
  name: zobsai-backend
  namespace: zobsai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zobsai-backend
  template:
    metadata:
      labels:
        app: zobsai-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/zobsai-com/zobsai-backend:ffb0402b2d3b64c2be10f5c47669af909ae68021
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: zobsai-backend-config
            - secretRef:
                name: zobsai-backend-secrets

---
apiVersion: v1
kind: Service
metadata:
  name: zobsai-backend
  namespace: zobsai
spec:
  selector:
    app: zobsai-backend
  ports:
    - port: 8080        # Service port
      targetPort: 8080  # Container port
      nodePort: 30070  # External port on the node (must be between 30000–32767)
  type: NodePort

