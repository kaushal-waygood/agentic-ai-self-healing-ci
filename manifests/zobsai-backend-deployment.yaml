apiVersion: apps/v1
kind: Deployment
metadata:
  name: zobsai-backend
  namespace: zobsai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zobsai-backend
  template:
    metadata:
      labels:
        app: zobsai-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/zobsai-com/zobsai-backend:514cc4a6f7fd5d5825e9c8575bcddc18cc9d1708
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: zobsai-backend-secrets
          env:
            # Override any local .env values
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: zobsai-backend-secrets
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: zobsai-backend-secrets
                  key: REDIS_PORT
---
apiVersion: v1
kind: Service
metadata:
  name: zobsai-backend
  namespace: zobsai
spec:
  selector:
    app: zobsai-backend
  ports:
    - port: 8080      # Frontend calls this port
      targetPort: 8080 # Container port
  type: ClusterIP      # Internal pod-to-pod connectivity
