apiVersion: apps/v1
kind: Deployment
metadata:
  name: zobsai-backend
  namespace: zobsai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zobsai-backend
  template:
    metadata:
      labels:
        app: zobsai-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/zobsai-com/zobsai-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: zobsai-backend-secrets
          env:
            - name: REDIS_HOST
              value: "zobsai-redis.zobsai.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: zobsai-backend
  namespace: zobsai
spec:
  selector:
    app: zobsai-backend
  ports:
    - port: 8000        # frontend calls this port
      targetPort: 4000  # container port
  type: ClusterIP       # internal pod-to-pod connectivity
