apiVersion: apps/v1
kind: Deployment
metadata:
  name: zobsai-backend
  namespace: zobsai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zobsai-backend
  template:
    metadata:
      labels:
        app: zobsai-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/zobsai-com/zobsai-backend:a47116efaa69888aa8c4661c936aa6191bc5154e
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: zobsai-backend-secrets
          env:
            # Override any local .env values
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: zobsai-backend-secrets
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: zobsai-backend-secrets
                  key: REDIS_PORT
---
apiVersion: v1
kind: Service
metadata:
  name: zobsai-backend
  namespace: zobsai
spec:
  selector:
    app: zobsai-backend
  ports:
    - port: 8080        # Service port
      targetPort: 8080  # Container port
      nodePort: 30070  # External port on the node (must be between 30000–32767)
  type: NodePort

