apiVersion: apps/v1
kind: Deployment
metadata:
  name: zobsai-backend
  namespace: zobsai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zobsai-backend
  template:
    metadata:
      labels:
        app: zobsai-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/zobsai-com/zobsai-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
---
apiVersion: v1
kind: Service
metadata:
  name: zobsai-backend
  namespace: zobsai
spec:
  selector:
    app: zobsai-backend
  ports:
    - port: 4000
      targetPort: 4000
