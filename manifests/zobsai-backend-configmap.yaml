apiVersion: v1
kind: ConfigMap
metadata:
  name: zobsai-backend-config
  namespace: zobsai
data:
  NODE_ENV: 'development'
  SAMPLE_KEY: 'dev-value'
  REDIS_HOST: 'zobsai-redis.dev-zobsai.svc.cluster.local'
  REDIS_PORT: '6379'

  EMAIL_HOST: 'smtp.gmail.com'
  EMAIL_PORT: '2525'
  EMAIL_SECURE: 'false'

  BACKEND_URL: 'https://api.zobsai.com'
  FRONTEND_URL: 'https://zobsai.com'
