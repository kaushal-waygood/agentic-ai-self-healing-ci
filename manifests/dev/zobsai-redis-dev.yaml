apiVersion: v1
kind: Service
metadata:
  name: zobsai-redis
  namespace: dev-zobsai
spec:
  selector:
    app: zobsai-redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zobsai-redis
  namespace: dev-zobsai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zobsai-redis
  template:
    metadata:
      labels:
        app: zobsai-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
