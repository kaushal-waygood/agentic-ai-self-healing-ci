---
# Backend Deployment & Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zobsai-backend
  namespace: dev-zobsai
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
  labels:
    app: zobsai-backend
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:  
      app: zobsai-backend
  template:
    metadata:
      labels:
        app: zobsai-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/zobsai-com/zobsai-backend:26968857a7c0beeca219340d3d82e31445453017
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: zobsai-backend-config
            - secretRef:
                name: zobsai-backend-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: zobsai-backend
  namespace: dev-zobsai
spec:
  selector:
    app: zobsai-backend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30050
  type: NodePort
