apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zobsai-ingress-dev
  namespace: dev-zobsai
  annotations:
    ingressClassName: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.tls: 'true'
spec:
  tls:
    - hosts:
        - dev.zobsai.com
        - www.dev.zobsai.com
      secretName: zobsai-frontend-dev-tls
    - hosts:
        - api.dev.zobsai.com
      secretName: zobsai-backend-dev-tls
  rules:
    # Frontend (dev)
    - host: dev.zobsai.com
      http:
        paths:
          # Uni Company Panel  →  /uni-com/*
          # NOTE: Next.js basePath is set to /uni-com so do NOT use StripPrefix here.
          # Traefik must forward the full path (with /uni-com) to the panel service.
          - path: /uni-admin
            pathType: Prefix
            backend:
              service:
                name: zobsai-uni-company-panel
                port:
                  number: 3002

          # Main Frontend  →  everything else
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zobsai-frontend
                port:
                  number: 3000

    # www redirect also serves frontend + panel
    - host: www.dev.zobsai.com
      http:
        paths:
          - path: /uni-admin
            pathType: Prefix
            backend:
              service:
                name: zobsai-uni-company-panel
                port:
                  number: 3002

          - path: /
            pathType: Prefix
            backend:
              service:
                name: zobsai-frontend
                port:
                  number: 3000

    # Backend (dev API)
    - host: api.dev.zobsai.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zobsai-backend
                port:
                  number: 8080
