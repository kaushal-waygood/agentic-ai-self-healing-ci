apiVersion: apps/v1
kind: Deployment
metadata:
  name: zobsai-uni-admin
  namespace: dev-zobsai
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
  labels:
    app: zobsai-uni-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zobsai-uni-admin
  template:
    metadata:
      labels:
        app: zobsai-uni-admin
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: uni-admin
          image: ghcr.io/zobsai-com/zobsai-uni-admin:345a0ba3c82a73ca2f0e1208777c076a62dc5566
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: zobsai-uni-admin-config
            - secretRef:
                name: zobsai-uni-admin-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: zobsai-uni-admin
  namespace: dev-zobsai
spec:
  type: NodePort
  selector:
    app: zobsai-uni-admin
  ports:
    - port: 3002 # Service port
      targetPort: 3002 # Container port
      nodePort: 30032 # NodePort (optional, can be omitted)
