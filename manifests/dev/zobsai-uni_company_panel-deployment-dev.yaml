apiVersion: apps/v1
kind: Deployment
metadata:
  name: uni_company_panel
  namespace: dev-zobsai
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
  labels:
    app: uni_company_panel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uni_company_panel
  template:
    metadata:
      labels:
        app: uni_company_panel
    spec:
      containers:
        - name: uni_company_panel
          image: ghcr.io/zobsai-com/zobsai-uni_company_panel:345a0ba3c82a73ca2f0e1208777c076a62dc5566
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: uni_company_panel-config
            - secretRef:
                name: uni_company_panel-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: uni_company_panel
  namespace: dev-zobsai
spec:
  type: NodePort
  selector:
    app: uni_company_panel
  ports:
    - port: 3002 # Service port
      targetPort: 3002 # Container port
      nodePort: 30032 # NodePort (optional, can be omitted)
