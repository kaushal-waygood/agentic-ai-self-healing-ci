apiVersion: apps/v1
kind: Deployment
metadata:
  name: zobsai-frontend
  namespace: dev-zobsai
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
  labels:
    app: zobsai-frontend
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: zobsai-frontend
  template:
    metadata:
      labels:
        app: zobsai-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: frontend
          image: ghcr.io/zobsai-com/zobsai-frontend:ac2a2985b27d9645689b5cd8daf095a2b62f8a30
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: zobsai-frontend-config
            - secretRef:
                name: zobsai-frontend-secrets
          resources:
            requests:
              cpu: '500m'
              memory: '1Gi'
            limits:
              cpu: '1500m'
              memory: '2Gi'
---
apiVersion: v1
kind: Service
metadata:
  name: zobsai-frontend
  namespace: dev-zobsai
spec:
  type: NodePort
  selector:
    app: zobsai-frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030
