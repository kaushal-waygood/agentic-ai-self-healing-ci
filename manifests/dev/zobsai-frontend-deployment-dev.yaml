apiVersion: apps/v1
kind: Deployment
metadata:
  name: zobsai-frontend
  namespace: dev-zobsai
labels:
  app: zobsai-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zobsai-frontend
  template:
    metadata:
      labels:
        app: zobsai-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: frontend
          image: ghcr.io/zobsai-com/zobsai-frontend:d1aa7df573c85aa50a1a957ce803e889ad772534
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: zobsai-frontend-config
            - secretRef:
                name: zobsai-frontend-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: zobsai-frontend
  namespace: zobsai
spec:
  type: NodePort
  selector:
    app: zobsai-frontend
  ports:
    - port: 3000 # Service port
      targetPort: 3000 # Container port
      nodePort: 30030 # NodePort (30000-32767)
