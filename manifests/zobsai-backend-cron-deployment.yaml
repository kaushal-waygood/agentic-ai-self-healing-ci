apiVersion: apps/v1
kind: Deployment
metadata:
  name: zobsai-backend-cron
  namespace: zobsai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zobsai-backend-cron
  template:
    metadata:
      labels:
        app: zobsai-backend-cron
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend-cron
          image: ghcr.io/zobsai-com/zobsai-backend:latest
          imagePullPolicy: Always
          command:
            - node
            - cron-worker.js
          env:
            - name: ENABLE_IN_PROCESS_CRONS
              value: 'false'
          envFrom:
            - configMapRef:
                name: zobsai-backend-config
            - secretRef:
                name: zobsai-backend-secrets
