apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wp-zobsai
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: wordpress
    targetRevision: 27.1.8
    helm:
      releaseName: wp-zobsai
      values: |
        image:
          registry: docker.io
          repository: bitnami/wordpress
          tag: "latest"
          pullPolicy: IfNotPresent

        ## ❤️ Pod annotations to control health checks
        podAnnotations:
          prometheus.io/scrape: "false"

        ## ❤️ Override probes with custom config that won't timeout
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 300
          periodSeconds: 60
          timeoutSeconds: 60
          failureThreshold: 10
          successThreshold: 1

        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 600
          periodSeconds: 60
          timeoutSeconds: 60
          failureThreshold: 5
          successThreshold: 1

        wordpressUsername: admin
        wordpressPassword: "admin1234!"
        wordpressEmail: admin@zobsai.com
        wordpressBlogName: "Zobsai Blog"

        ## ❤️ Make WordPress believe it runs inside /resources
        wordpressExtraConfigContent: |
          define( 'WP_HOME', 'https://zobsai.com/resources' );
          define( 'WP_SITEURL', 'https://zobsai.com/resources' );

        service:
          type: ClusterIP

        ingress:
          enabled: true
          ingressClassName: traefik
          hostname: zobsai.com
          path: /resources
          pathType: Prefix
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
            traefik.ingress.kubernetes.io/router.middlewares: wordpress-resources-rewrite@kubernetescrd
          tls: true
          certManager:
            enabled: true
            issuer:
              name: letsencrypt-prod
              kind: ClusterIssuer

        ## ❤️ Increase memory for WordPress with plugins
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1024Mi"
            cpu: "1000m"

        persistence:
          enabled: true
          storageClass: "local-path"
          accessMode: ReadWriteOnce
          size: 10Gi

        mariadb:
          enabled: true
          auth:
            rootPassword: "admin1234!"
            database: bitnami_wordpress
            username: bn_wordpress
            password: "admin1234!"
          primary:
            persistence:
              enabled: true
              storageClass: "local-path"
              size: 10Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: wordpress

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: wp-zobsai-mariadb
      namespace: wordpress
      jsonPointers:
        - /spec/template/metadata/annotations
        - /spec/template/spec/containers/0/env
        - /spec/template/spec/containers/0/image
        - /spec/volumeClaimTemplates
        - /spec/revisionHistoryLimit
    - group: apps
      kind: Deployment
      name: wp-zobsai-wordpress
      namespace: wordpress
      jsonPointers:
        - /spec/template/spec/containers/0/readinessProbe
        - /spec/template/spec/containers/0/livenessProbe
---
# -------------------------------
# Traefik Middleware for path rewrite
# -------------------------------
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: wordpress-resources-rewrite
  namespace: wordpress
spec:
  redirectRegex:
    regex: ^/resources/(.*)
    replacement: /$1
    permanent: true
---
# -------------------------------
# Ingress for blog subdomain (admin access)
# -------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wp-zobsai-blog
  namespace: wordpress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: zobsai-blog-rewrite@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - blog.zobsai.com
      secretName: wp-zobsai-blog-tls
  rules:
    - host: blog.zobsai.com
      http:
        paths:
          - path: /wp-admin
            pathType: Prefix
            backend:
              service:
                name: wp-zobsai
                port:
                  number: 80
---
# -------------------------------
# Traefik Middleware for blog rewrite
# -------------------------------
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: blog-rewrite
  namespace: wordpress
spec:
  redirectRegex:
    regex: ^/wp-admin/(.*)
    replacement: /resources/wp-admin/$1
    permanent: false
