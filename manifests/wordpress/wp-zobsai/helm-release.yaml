apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wp-zobsai
  namespace: monitoring
spec:
  project: default

  source:
    repoURL: oci://registry-1.docker.io/bitnamicharts
    chart: wordpress
    targetRevision: 27.1.8
    helm:
      releaseName: wp-zobsai
      valueFiles:
        - values-zobsai.yaml   # MUST be inside your Git repo

  destination:
    server: https://kubernetes.default.svc
    namespace: wordpress

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
