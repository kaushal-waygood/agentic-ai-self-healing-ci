apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wp-zobsai
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: wordpress
    targetRevision: 27.1.8
    helm:
      releaseName: wp-zobsai
      values: |
        image:
          registry: docker.io
          repository: bitnami/wordpress
          tag: "latest"
          pullPolicy: IfNotPresent

        ## ❤️ Pod annotations to control health checks
        podAnnotations:
          prometheus.io/scrape: "false"

        ## ❤️ Override probes with custom config that won't timeout
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 300
          periodSeconds: 60
          timeoutSeconds: 60
          failureThreshold: 10
          successThreshold: 1

        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 600
          periodSeconds: 60
          timeoutSeconds: 60
          failureThreshold: 5
          successThreshold: 1

        wordpressUsername: admin
        wordpressPassword: "admin1234!"
        wordpressEmail: admin@zobsai.com
        wordpressBlogName: "Zobsai Blog"

        ## ❤️ Make WordPress believe it runs inside /resources
        # Prefer X-Forwarded-Host (set by Traefik) when available so WP
        # determines the correct host for admin redirects.
        wordpressExtraConfigContent: |
          $host = '';
          if ( !empty($_SERVER['HTTP_X_FORWARDED_HOST']) ) {
            $host = $_SERVER['HTTP_X_FORWARDED_HOST'];
          } elseif ( !empty($_SERVER['HTTP_HOST']) ) {
            $host = $_SERVER['HTTP_HOST'];
          } else {
            $host = 'zobsai.com';
          }
          if ( $host === 'blog.zobsai.com' ) {
            define( 'WP_HOME', 'https://blog.zobsai.com/resources' );
            define( 'WP_SITEURL', 'https://blog.zobsai.com/resources' );
          } else {
            define( 'WP_HOME', 'https://zobsai.com/resources' );
            define( 'WP_SITEURL', 'https://zobsai.com/resources' );
          }

          // Ensure SSL detection behind Traefik
          if ( isset( $_SERVER['HTTP_X_FORWARDED_PROTO'] ) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https' ) {
            $_SERVER['HTTPS'] = 'on';
          }

          // Cookie and path settings so admin works under /resources or subdomain
          if ( $host === 'blog.zobsai.com' ) {
            define( 'COOKIE_DOMAIN', 'zobsai.com' );
            define( 'COOKIEPATH', '/resources/' );
            define( 'SITECOOKIEPATH', '/resources/' );
          } else {
            define( 'COOKIE_DOMAIN', 'zobsai.com' );
            define( 'COOKIEPATH', '/resources/' );
            define( 'SITECOOKIEPATH', '/resources/' );
          }

          define( 'FORCE_SSL_ADMIN', true );

        service:
          type: ClusterIP

        ingress:
          enabled: true
          ingressClassName: traefik
          hostname: zobsai.com
          path: /resources
          pathType: Prefix
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
            traefik.ingress.kubernetes.io/router.middlewares: wordpress-rewrite-resources@kubernetescrd
          tls: true
          certManager:
            enabled: true
            issuer:
              name: letsencrypt-prod
              kind: ClusterIssuer

        ## ❤️ Increase memory for WordPress with plugins
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1024Mi"
            cpu: "1000m"

        persistence:
          enabled: true
          storageClass: "local-path"
          accessMode: ReadWriteOnce
          size: 10Gi

        mariadb:
          enabled: true
          auth:
            rootPassword: "admin1234!"
            database: bitnami_wordpress
            username: bn_wordpress
            password: "admin1234!"
          primary:
            persistence:
              enabled: true
              storageClass: "local-path"
              size: 10Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: wordpress

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: wp-zobsai-mariadb
      namespace: wordpress
      jsonPointers:
        - /spec/template/metadata/annotations
        - /spec/template/spec/containers/0/env
        - /spec/template/spec/containers/0/image
        - /spec/volumeClaimTemplates
        - /spec/revisionHistoryLimit
    - group: apps
      kind: Deployment
      name: wp-zobsai-wordpress
      namespace: wordpress
      jsonPointers:
        # Allow ArgoCD to manage readiness/liveness probes so fixes propagate
---
# -------------------------------
# Traefik Middleware for path rewrite
# -------------------------------
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: wordpress-rewrite-resources
  namespace: wordpress
spec:
  replacePathRegex:
    regex: "^/resources(.*)"
    replacement: "$1"
---
# -------------------------------
# Ingress for blog subdomain (admin access)
# -------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wp-zobsai-blog
  namespace: wordpress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: blog-rewrite@kubernetescrd,blog-set-headers@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - blog.zobsai.com
      secretName: wp-zobsai-blog-tls
  rules:
    - host: blog.zobsai.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wp-zobsai-wordpress
                port:
                  number: 80

---
# -------------------------------
# Traefik Middleware for blog rewrite
# -------------------------------
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: blog-rewrite
  namespace: wordpress
spec:
  replacePathRegex:
    regex: '^/(wp-login\.php|wp-admin/(.*))'
    replacement: '/resources/$1'

---
# Middleware to ensure WordPress sees the original host/proto
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: blog-set-headers
  namespace: wordpress
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Host: "blog.zobsai.com"
      X-Forwarded-Proto: "https"

