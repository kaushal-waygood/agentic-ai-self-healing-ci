apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wp-zobsai
  namespace: monitoring
spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: wordpress
    targetRevision: 27.1.8
    helm:
      releaseName: wp-zobsai
      values: |
        image:
          registry: docker.io
          repository: bitnami/wordpress
          tag: "latest"
          pullPolicy: IfNotPresent

        wordpressUsername: admin
        wordpressPassword: "admin1234!"
        wordpressEmail: admin@zobsai.com
        wordpressBlogName: "Zobsai Blog"

        service:
          type: ClusterIP

        ## ------------------------------
        ## MAIN HOST (blog.zobsai.com)
        ## ------------------------------
        ingress:
          enabled: true
          ingressClassName: traefik
          hostname: blog.zobsai.com
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
          tls: true
          certManager:
            enabled: true
            issuer:
              name: letsencrypt-prod
              kind: ClusterIssuer

        persistence:
          enabled: true
          storageClass: "local-path"
          accessMode: ReadWriteOnce
          size: 10Gi

        mariadb:
          enabled: true
          auth:
            rootPassword: "admin1234!"
            database: bitnami_wordpress
            username: bn_wordpress
            password: "admin1234!"
          primary:
            persistence:
              enabled: true
              storageClass: "local-path"
              size: 10Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: wordpress

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: wp-zobsai-mariadb
      namespace: wordpress
      jsonPointers:
        - /spec/template/metadata/annotations
        - /spec/template/spec/containers/0/env
        - /spec/template/spec/containers/0/image
        - /spec/volumeClaimTemplates
        - /spec/revisionHistoryLimit

---
# Additional Traefik IngressRoute for zobsai.com/resources
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: wp-zobsai-resources
  namespace: wordpress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`zobsai.com`) && PathPrefix(`/resources`)
      kind: Rule
      services:
        - name: wp-zobsai-wordpress
          port: 80
  tls:
    secretName: zobsai-main-tls
