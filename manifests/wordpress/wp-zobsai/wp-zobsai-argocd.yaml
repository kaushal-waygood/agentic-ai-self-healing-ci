apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wp-zobsai
  namespace: wordpress
spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: wordpress
    targetRevision: 27.1.8
    helm:
      releaseName: wp-zobsai
      values: |
        image:
          registry: docker.io
          repository: bitnami/wordpress
          tag: "latest"
          pullPolicy: IfNotPresent

        podAnnotations:
          prometheus.io/scrape: "false"

        readinessProbe:
          httpGet:
            path: /resources
            port: http
          initialDelaySeconds: 300
          periodSeconds: 60
          timeoutSeconds: 60
          failureThreshold: 10
          successThreshold: 1

        livenessProbe:
          httpGet:
            path: /resources
            port: http
          initialDelaySeconds: 600
          periodSeconds: 60
          timeoutSeconds: 60
          failureThreshold: 5
          successThreshold: 1

        wordpressUsername: admin
        wordpressPassword: "admin1234!"
        wordpressEmail: admin@zobsai.com
        wordpressBlogName: "Zobsai Blog"

        wordpressExtraConfigContent: |
          define( 'WP_HOME', 'https://zobsai.com/resources' );
          define( 'WP_SITEURL', 'https://zobsai.com/resources' );

        service:
          type: ClusterIP

        ingress:
          enabled: false

        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1024Mi"
            cpu: "1000m"

        persistence:
          enabled: true
          storageClass: "local-path"
          accessMode: ReadWriteOnce
          size: 10Gi

        mariadb:
          enabled: true
          auth:
            rootPassword: "admin1234!"
            database: bitnami_wordpress
            username: bn_wordpress
            password: "admin1234!"
          primary:
            persistence:
              enabled: true
              storageClass: "local-path"
              size: 10Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: wordpress

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: wp-zobsai-mariadb
      namespace: wordpress
      jsonPointers:
        - /spec/template/metadata/annotations
        - /spec/template/spec/containers/0/env
        - /spec/template/spec/containers/0/image
        - /spec/volumeClaimTemplates
        - /spec/revisionHistoryLimit
    - group: apps
      kind: Deployment
      name: wp-zobsai-wordpress
      namespace: wordpress
      jsonPointers:
        - /spec/template/spec/containers/0/readinessProbe
        - /spec/template/spec/containers/0/livenessProbe

---
# -------------------------------
# Middleware to strip /resources from public site
# -------------------------------
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: wordpress-resources-rewrite
  namespace: wordpress
spec:
  redirectRegex:
    regex: ^/resources/(.*)
    replacement: /$1
    permanent: true

---
# -------------------------------
# Middleware to rewrite /wp-login.php for admin subdomain
# -------------------------------
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: blog-rewrite
  namespace: wordpress
spec:
  redirectRegex:
    regex: ^/wp-login.php/(.*)
    replacement: /resources/wp-login.php/$1
    permanent: false

---
# -------------------------------
# Public site ingress for Zobsai WordPress
# -------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wp-public-blog
  namespace: wordpress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: wordpress-resources-rewrite@kubernetescrd
spec:
  rules:
    - host: zobsai.com
      http:
        paths:
          - path: /resources
            pathType: Prefix
            backend:
              service:
                name: wp-zobsai
                port:
                  number: 80
  tls:
    - hosts:
        - zobsai.com
      secretName: zobsai-tls

---
# -------------------------------
# Admin subdomain ingress for Zobsai WordPress
# -------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wp-admin-subdomain
  namespace: wordpress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: blog-rewrite@kubernetescrd
spec:
  rules:
    - host: blog.zobsai.com
      http:
        paths:
          - path: /wp-login.php
            pathType: Prefix
            backend:
              service:
                name: wp-zobsai
                port:
                  number: 80
  tls:
    - hosts:
        - blog.zobsai.com
      secretName: wp-zobsai-blog-tls
