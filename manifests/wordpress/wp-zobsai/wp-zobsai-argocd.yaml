apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wp-zobsai
  namespace: monitoring
spec:
  project: default
  source:
    repoURL: https://github.com/ZobsAI-com/zobsai.git
    path: manifests/wordpress/wp-zobsai
    targetRevision: HEAD

  destination:
    server: https://kubernetes.default.svc
    namespace: wordpress

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
# Middleware to strip /resources prefix before passing to WordPress
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: wordpress-strip-prefix
  namespace: wordpress
spec:
  stripPrefix:
    prefixes:
      - /resources

---
# Middleware for admin login (blog.zobsai.com)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: blog-rewrite
  namespace: wordpress
spec:
  redirectRegex:
    regex: ^/wp-login.php/(.*)
    replacement: /wp-login.php/$1
    permanent: false

---
# Public site IngressRoute for /resources
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wp-public-blog
  namespace: wordpress
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`zobsai.com`) && PathPrefix(`/resources`)
      kind: Rule
      services:
        - name: wp-zobsai-wordpress
          port: 80
      middlewares:
        - name: wordpress-strip-prefix
          namespace: wordpress
  tls:
    secretName: zobsai-tls

---
# Admin subdomain IngressRoute for blog.zobsai.com
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wp-admin-subdomain
  namespace: wordpress
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`blog.zobsai.com`)
      kind: Rule
      services:
        - name: wp-zobsai-wordpress
          port: 80
      middlewares:
        - name: blog-rewrite
          namespace: wordpress
  tls:
    secretName: wp-zobsai-blog-tls
