apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zobsai
  namespace: monitoring
spec:
  project: default
  source:
    repoURL: https://github.com/ZobsAI-com/zobsai.git
    path: manifests
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: zobsai
  syncPolicy:
    automated:
      prune: true        # deletes resources removed from Git
      selfHeal: true     # restores last healthy state if drift occurs
      retry:
        limit: 5         # number of retry attempts for failed sync
        backoff:
          duration: 5s   # initial wait before retry
          factor: 2      # exponential backoff factor
          maxDuration: 3m  # maximum wait between retries
